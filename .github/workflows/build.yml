name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build APK
        run: gradle -p app assembleDebug

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -alias tile -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=MichaelJordan, OU=NBA, O=Bulls, L=Chicago, S=IL, C=US" \
            -storepass michael23 -keypass michael23
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:michael23 \
            --key-pass pass:michael23 \
            --out app-release.apk \
            app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qs-tile
          path: app-release.apk
